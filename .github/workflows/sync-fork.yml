name: Sync Fork
on:
  schedule:
    - cron: '0 */12 * * *' # every 12 hours, on the hour
  workflow_dispatch: # on button click
jobs:
  sync-fork:
    runs-on: ubuntu-latest
    steps:
      - uses: tgymnich/fork-sync@v1.8
        with:
          owner: jamescherti
          base: main
          head: main
          merge_method: rebase
